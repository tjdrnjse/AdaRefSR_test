# ── I/O paths (can be overridden by CLI --lq_path / --ref_path / --output_path) ──
# 단일 파일: 파일 경로를 직접 지정
# 폴더 배치: 폴더 경로를 지정하면 동일 파일명으로 자동 매칭
lq_path:     null   # 예) "./assets/lq/img.png"  또는  "./assets/lq/"
ref_path:    null   # 예) "./assets/ref/img.png"  또는  "./assets/ref/"
output_path: null   # 예) "./assets/results/img.png"  또는  "./assets/results/"

# ── Model paths (same as demo_config.yaml) ──────────────────────────────────
sd_path:                  "your_code_path/model/stabilityai/sd-turbo"
pretrained_backbone_path: "your_code_path/model/zhangap/S3Diff/s3diff.pkl"
pretrained_ref_gen_path:  "your_code_path/model/adarefsr.pkl"
de_net_path:              "your_code_path/assets/mm-realsr/de_net.pth"
ram_path:                 "your_code_path/model/xinyu1205/recognize-anything/ram_swin_large_14m.pth"
dape_path:                "your_code_path/model/DAPE/DAPE.pth"

# ── Base inference settings ──────────────────────────────────────────────────
mixed_precision: "fp16"
fusion_blocks:   "full"
align_method:    "wavelet"
is_image:        True
enable_xformers: True

# ── Tiling settings ──────────────────────────────────────────────────────────
# tile_size: H=W of each tile sent to the model.
#   - Set to the model's native resolution (512 by default).
#   - Smaller values reduce VRAM but may hurt quality.
tile_size: 512

# tile_overlap: overlap in pixels between adjacent tiles.
#   - Larger overlap → smoother seams, more compute.
#   - Recommended range: 32–128.  Use ≥ 64 for best quality.
tile_overlap: 64

# tile_batch_size: number of tiles processed together on the GPU.
#   - Increase if you have enough VRAM; decrease if you run out of memory.
tile_batch_size: 4

# scale: SR upscale factor.
#   - Must match the training-time upscale ratio (default 4×).
scale: 4

# ── LR Blur (4x canvas) ──────────────────────────────────────────────────────
# lq_blur_sigma: SR 전에 4x LR canvas 에 적용할 Gaussian blur sigma.
#   - 0.0 (기본) : blur 없음.
#   - 양수        : sigma 값에 따라 kernel_size = 2*ceil(3*sigma)+1 로 자동 결정.
#   - FMT 특징점 매칭은 blur 적용 전 원본 해상도 LR 로 수행되므로 영향 없음.
#   - wavelet color fix 는 blur 된 LR 을 기준으로 수행됨.
lq_blur_sigma: 0.0

# ── AICG 시각화 설정 (visualize_aicg.py) ────────────────────────────────────
# visualize: true 로 설정하면 인퍼런스와 동시에 3종 히트맵을 생성.
#   - Map1 Trust    : 모든 LQ 토큰이 Ref 이미지의 어느 위치를 참조했는지 (Eq.2 A_RA)
#   - Map2 Verify   : AICG Gate(G) 값 분포 (Eq.6 G)
#   - Map3 Combined : 최종 복원에 기여한 Ref 위치 (G → Ref 공간, Eq.7)
#   출력: [Trust | Verify | Combined | Coverage] 4패널을 가로 연결한 고해상도 PNG
visualize: false

# vis_output_path: 시각화 PNG 저장 경로.
#   - null 로 두면 output_path 와 동일 디렉터리에 "<파일명>_aicg_vis.png" 로 자동 저장.
vis_output_path: null   # 예) "./assets/results/img_aicg_vis.png"

# ─────────────────────────────────────────────────────────────────────────────
# AICG Steering (FMT-matched tile 에 대한 Trust/Verify 강화)
# ─────────────────────────────────────────────────────────────────────────────
# 동작 조건:
#   - enable_steering: true 로 설정해야 함.
#   - use_feature_matching_tiling: true 일 때: FMT로 매칭된 tile에만 steering 적용.
#                                  false 일 때: 모든 tile에 전역 steering 적용.
#
# 두 개의 intervention:
#   * Trust  : Q·K^T logit 에 trust_scale 을 곱해 Ref 집중도 강화.
#   * Verify : Gate G 에 verify_scale 을 곱해 Ref 신호 통과량 강화.
enable_steering:     false

# ── AICGSteerer 강화 배율 (effective = scale * individual) ────────────────
# scale=1.0, trust_scale=1.0, verify_scale=1.0  → 완전한 no-op (회귀 위험 0)
aicg_scale:          1.0    # 전역 multiplier: 0.5 ~ 1.5
aicg_trust_scale:    1.8    # Trust (Q·K^T pre-softmax logit scale).  1.5 ~ 2.5 권장
aicg_verify_scale:   2.0    # Verify (Gate G post-sigmoid scale).      1.5 ~ 3.0 권장.
# aicg_force_verify: true 이면 verify_scale 무관하게 gate 를 무조건 1.0 으로 강제.
aicg_force_verify:   false

# ─────────────────────────────────────────────────────────────────────────────
# Full Ref Attention (single-pass global ref)
# ─────────────────────────────────────────────────────────────────────────────
# ref 를 1회만 (full_ref_size, full_ref_size) 로 resize 한 뒤 모든 LR tile 이
# 동일한 ref bank 를 공유.  per-tile proportional ref crop 로직은 비활성됨.
#
# enable_full_ref : false 이면 기존 per-tile ref crop 동작 (수치적으로 원본 동일).
# full_ref_size   : 글로벌 ref 의 H=W.  1024 가 기본값.  GPU VRAM 에 따라 조정.
enable_full_ref:     false
full_ref_size:       1024

# ─────────────────────────────────────────────────────────────────────────────
# XFeat Feature Matching Tiling (Dynamic Ref Tile Selection)
# ─────────────────────────────────────────────────────────────────────────────
# use_feature_matching_tiling: true 이면 XFeat 특징점 매칭으로 ref 타일을 동적
#   선택 (Strategy 1, Median-based Crop).  false(기본) = 기존 비례 크롭 유지.
#
# Pipeline:
#   1. Scale Sync    : ref 를 lr 해상도로 임시 resize
#   2. XFeat Match   : sparse 특징점 매칭
#   3. RANSAC        : cv2.findHomography 인라이어 필터링 (USAC_MAGSAC)
#   4. Re-project    : ref 특징점을 원본 ref 해상도로 역산
#   5. Tile Filter   : lr 타일 내 특징점 검색
#   6. Median Crop   : median(ref pts) 중심의 고정 크기 BBox 크롭
#   7. Fallback      : lr 타일에 특징점 없으면 기존 비례 크롭으로 폴백
#                      (fallback tile 은 steering 도 적용되지 않음)
#
# enable_steering=true 와 함께 사용하면:
#   - FMT matched tile: ref = FMT crop, steering ON
#   - FMT fallback tile: ref = 비례 크롭 (같은 위치), steering OFF
#
# xfeat_project_path: accelerated_features 폴더 경로.
#   런타임에 sys.path.insert 로 동적 로드됨.
#
# 주의: enable_full_ref=true 와 병용 시 feature matching 은 자동 비활성됨
#       (full_ref 모드에서는 per-tile ref crop 자체가 없음).
use_feature_matching_tiling: false
xfeat_project_path: null    # 예) "../accelerated_features"

# visualize_feature_matching: true 이면 feature matching 결과를 시각화하여 결과 폴더에 저장.
#   저장 파일명: <출력파일명>_fmt_vis.png
visualize_feature_matching: false

# ── Feature Matching 품질 튜닝 ─────────────────────────────────────────────
#
# fmt_ransac_threshold: RANSAC reprojection error 허용치 (매칭 공간 기준 픽셀).
#   기본값 3.5 (XFeat 권장값).  생성형 AI 편집 + 변형 있을 때: 5.0 ~ 8.0 시도.
# fmt_matcher: 'xfeat' (MNN, 기본) 또는 'lighterglue' (kornia 필요, 더 강건).
fmt_matcher: xfeat
fmt_ransac_threshold: 3.5

# fmt_min_inliers: RANSAC 후 최소 inlier 수. 이 수 미만이면 전체 폴백.
#   기본값 4 (findHomography 최소 요구치).  자주 실패하면 3으로 낮춰볼 것.
fmt_min_inliers: 4

# fmt_match_at_ref_resolution: true = LQ를 ref 해상도로 업샘플 후 매칭 (고품질, 느림).
#   false (기본) = ref를 LQ 해상도로 다운샘플.
fmt_match_at_ref_resolution: false

# ─────────────────────────────────────────────────────────────────────────────
# 사용 예시 (CLI)
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 1] 단일 이미지 SR + 시각화
#
#   python demo_tiled.py \
#     --lq_path     ./assets/lq/sample.png \
#     --ref_path    ./assets/ref/sample.png \
#     --output_path ./assets/results/sample.png \
#     --visualize
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 2] 폴더 배치 처리
#
#   python demo_tiled.py \
#     --lq_path     ./assets/lq/ \
#     --ref_path    ./assets/ref/ \
#     --output_path ./assets/results/ \
#     --visualize
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 3] FMT + Steering (matched tile만 steering)
#
#   python demo_tiled.py \
#     --lq_path     ./assets/lq/sample.png \
#     --ref_path    ./assets/ref/sample.png \
#     --output_path ./assets/results/sample.png \
#     --use_feature_matching_tiling \
#     --xfeat_project_path ../accelerated_features \
#     --enable_steering
#
#   → FMT로 매칭된 tile: FMT ref crop + Trust/Verify steering 적용
#   → FMT fallback tile: 비례 ref crop + steering 없음
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [히트맵 해석 가이드]
#
#   Map1 Trust    – 밝은 영역: LQ 가 Ref 이미지의 해당 위치를 강하게 참조함.
#   Map2 Verify   – 밝은 영역: AICG Gate가 열려 있어 Ref 정보가 신뢰됨.
#   Map3 Combined – Map1 × Map2. 실제 복원에 기여한 Ref의 유효 위치.
#   Map4 Coverage – ref crop 방문 횟수 히트맵 + tile crop 경계 박스.
# ─────────────────────────────────────────────────────────────────────────────
