# ── I/O paths (can be overridden by CLI --lq_path / --ref_path / --output_path) ──
# 단일 파일: 파일 경로를 직접 지정
# 폴더 배치: 폴더 경로를 지정하면 동일 파일명으로 자동 매칭
lq_path:     null   # 예) "./assets/lq/img.png"  또는  "./assets/lq/"
ref_path:    null   # 예) "./assets/ref/img.png"  또는  "./assets/ref/"
output_path: null   # 예) "./assets/results/img.png"  또는  "./assets/results/"

# ── Model paths (same as demo_config.yaml) ──────────────────────────────────
sd_path:                  "your_code_path/model/stabilityai/sd-turbo"
pretrained_backbone_path: "your_code_path/model/zhangap/S3Diff/s3diff.pkl"
pretrained_ref_gen_path:  "your_code_path/model/adarefsr.pkl"
de_net_path:              "your_code_path/assets/mm-realsr/de_net.pth"
ram_path:                 "your_code_path/model/xinyu1205/recognize-anything/ram_swin_large_14m.pth"
dape_path:                "your_code_path/model/DAPE/DAPE.pth"

# ── Base inference settings ──────────────────────────────────────────────────
mixed_precision: "fp16"
fusion_blocks:   "full"
align_method:    "wavelet"
is_image:        True
enable_xformers: True

# ── Tiling settings ──────────────────────────────────────────────────────────
# tile_size: H=W of each tile sent to the model.
#   - Set to the model's native resolution (512 by default).
#   - Smaller values reduce VRAM but may hurt quality.
tile_size: 512

# tile_overlap: overlap in pixels between adjacent tiles.
#   - Larger overlap → smoother seams, more compute.
#   - Recommended range: 32–128.  Use ≥ 64 for best quality.
tile_overlap: 64

# tile_batch_size: number of tiles processed together on the GPU.
#   - Increase if you have enough VRAM; decrease if you run out of memory.
tile_batch_size: 4

# scale: SR upscale factor.
#   - Must match the training-time upscale ratio (default 4×).
#   - LQ is bicubic-upscaled by this factor before tiling; output is scale× larger than input LQ.
scale: 4
