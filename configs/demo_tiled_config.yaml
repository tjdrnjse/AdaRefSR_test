# ── I/O paths (can be overridden by CLI --lq_path / --ref_path / --output_path) ──
# 단일 파일: 파일 경로를 직접 지정
# 폴더 배치: 폴더 경로를 지정하면 동일 파일명으로 자동 매칭
lq_path:     null   # 예) "./assets/lq/img.png"  또는  "./assets/lq/"
ref_path:    null   # 예) "./assets/ref/img.png"  또는  "./assets/ref/"
output_path: null   # 예) "./assets/results/img.png"  또는  "./assets/results/"

# ── Model paths (same as demo_config.yaml) ──────────────────────────────────
sd_path:                  "your_code_path/model/stabilityai/sd-turbo"
pretrained_backbone_path: "your_code_path/model/zhangap/S3Diff/s3diff.pkl"
pretrained_ref_gen_path:  "your_code_path/model/adarefsr.pkl"
de_net_path:              "your_code_path/assets/mm-realsr/de_net.pth"
ram_path:                 "your_code_path/model/xinyu1205/recognize-anything/ram_swin_large_14m.pth"
dape_path:                "your_code_path/model/DAPE/DAPE.pth"

# ── Base inference settings ──────────────────────────────────────────────────
mixed_precision: "fp16"
fusion_blocks:   "full"
align_method:    "wavelet"
is_image:        True
enable_xformers: True

# ── Tiling settings ──────────────────────────────────────────────────────────
# tile_size: H=W of each tile sent to the model.
#   - Set to the model's native resolution (512 by default).
#   - Smaller values reduce VRAM but may hurt quality.
tile_size: 512

# tile_overlap: overlap in pixels between adjacent tiles.
#   - Larger overlap → smoother seams, more compute.
#   - Recommended range: 32–128.  Use ≥ 64 for best quality.
tile_overlap: 64

# tile_batch_size: number of tiles processed together on the GPU.
#   - Increase if you have enough VRAM; decrease if you run out of memory.
tile_batch_size: 4

# scale: SR upscale factor.
#   - Must match the training-time upscale ratio (default 4×).
#   - LQ is bicubic-upscaled by this factor before tiling; output is scale× larger than input LQ.
scale: 4

# ── AICG 시각화 설정 (visualize_aicg.py) ────────────────────────────────────
# visualize: true 로 설정하면 인퍼런스와 동시에 3종 히트맵을 생성.
#   - Map1 Trust    : ROI 영역 픽셀이 Ref 이미지의 어느 위치를 참조했는지 (Eq.2 A_RA)
#   - Map2 Verify   : AICG Gate(G) 값을 Ref 공간으로 역투영 (Eq.6 G)
#   - Map3 Combined : 최종 복원에 기여한 Ref 위치 ((ROI×G) → Ref 공간, Eq.7)
#   출력: [Trust | Verify | Combined] 3패널을 가로 연결한 고해상도 PNG
visualize: false

# roi_path: LQ 관심 영역(ROI) 마스크 경로.
#   - 단일 파일: grayscale PNG 1장을 모든 이미지에 공통 적용.
#   - 폴더 지정: lq_path/ref_path 와 동일한 파일명으로 이미지별 매칭.
#               매칭 파일이 없는 경우 해당 이미지는 전체 영역을 ROI로 사용 (경고 출력).
#   - 픽셀값: 0(무관심) ~ 255(관심), LQ 해상도와 다르면 자동 리사이즈.
#   - null 로 두면 전체 영역을 ROI로 간주.
roi_path: null   # 예) "./assets/roi/img_mask.png"  또는  "./assets/roi/"

# vis_output_path: 시각화 PNG 저장 경로.
#   - null 로 두면 output_path 와 동일 디렉터리에 "<파일명>_aicg_vis.png" 로 자동 저장.
vis_output_path: null   # 예) "./assets/results/img_aicg_vis.png"

# ─────────────────────────────────────────────────────────────────────────────
# AICG Steering & Face Preprocessing (얼굴 ID 보존을 위한 강화 옵션)
# ─────────────────────────────────────────────────────────────────────────────
# 동작 조건:
#   - roi_path 가 지정되어 있어야 함 (얼굴 영역 마스크).
#   - enable_steering 과 enable_face_preproc 는 독립적으로 켤 수 있음.
#
# 권장 사용:
#   enable_steering: true        # AICGSteerer Trust/Verify 강화
#   enable_face_preproc: true    # 얼굴 영역 LR 픽셀에 동적 Blur + Monochrome noise
#
# 두 옵션의 역할:
#   * face_preproc : 픽셀 공간 (VAE 통과 전) 에서 얼굴 영역의 구조적 단서를 흐리게 만들고
#                    monochrome noise 주입. 모델이 LQ 의 손상된 얼굴 디테일에 의존하지 않고
#                    Ref 로부터 ID 를 가져오도록 유도.
#   * steering     : Attention 단계에서 직접 개입.  Trust(logit) 와 Verify(gate G) 를
#                    얼굴 영역에서만 강제 증폭하여 Ref 의 영향을 명시적으로 끌어올림.
enable_steering:     false
enable_face_preproc: false

# ── AICGSteerer 강화 배율 (effective = scale * individual) ────────────────
# scale=1.0, trust_scale=1.0, verify_scale=1.0  → 완전한 no-op (회귀 위험 0)
aicg_scale:          1.0    # 전역 multiplier: 0.5 ~ 1.5
aicg_trust_scale:    1.8    # Trust (Q·K^T pre-softmax logit scale).  1.5 ~ 2.5 권장
aicg_verify_scale:   2.0    # Verify (Gate G post-sigmoid scale).      1.5 ~ 3.0 권장.
                            # 수치가 클수록 face 영역에서 G 가 1.0 에 클램프되어 강제 개방됨.
# aicg_force_verify: true 이면 verify_scale 값과 무관하게 face 영역 gate 를 무조건 1.0 으로 강제.
#   false(기본) → clamp(gate * verify_scale, 0, 1)  (soft scaling)
#   true        → gate = 1.0 무조건 (Hard Override, 가장 강한 Ref 강제 개방)
aicg_force_verify:   false

# ── Face mask softening ─────────────────────────────────────────────────
face_soft_mask:      true   # hard box → Gaussian blur soft mask (타일 경계 자연스러움)

# ── 동적 Blur sigma (원본 해상도 face box 픽셀 크기에 비례) ─────────────
# sigma = clamp(face_box_max_px * sigma_ratio, [sigma_min, sigma_max])
# 예) face_box_max=256 → sigma = 0.02 * 256 = 5.12  (clamp 내)
#     face_box_max=128 → sigma = 0.02 * 128 = 2.56
face_sigma_ratio:    0.02
face_sigma_min:      1.5
face_sigma_max:      8.0

# ── LR Image degradation params ─────────────────────────────────────────
# face_noise_std : Monochrome Gaussian noise std (in [-1, 1] 공간)
#                  RGB 독립 노이즈 X (chroma 노이즈 방지) → 단채널 broadcast
#                  0.05 ~ 0.15 권장.  너무 크면 OOD, 너무 작으면 효과 미미.
face_noise_std:      0.08

# face_blend_ratio : degraded vs 원본 LR 의 혼합 비율 (도메인 시프트 방어)
#                    0.0 = 전혀 degrade 안 함, 1.0 = 완전 degrade
#                    0.4 ~ 0.7 권장.
face_blend_ratio:    0.6

# ── Degraded LR 저장 옵션 ──────────────────────────────────────────────────
# save_degraded_lr: true 로 설정하면 blur/noise 가 적용된 LR 이미지를 output_path
#   와 같은 디렉터리에 <stem><suffix>.png 로 저장.
#   - enable_face_preproc 가 true 일 때만 유효 (false 이면 원본 LQ와 동일하므로 저장 생략).
# degraded_lr_suffix: 저장 파일명 접미사 (확장자 제외).
save_degraded_lr:    false
degraded_lr_suffix:  "_degrad_lr"

# ─────────────────────────────────────────────────────────────────────────────
# 사용 예시 (CLI)
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 1] 단일 이미지 SR + 시각화 (ROI 없음 – 전체 영역)
#
#   python demo_tiled.py \
#     --lq_path     ./assets/lq/sample.png \
#     --ref_path    ./assets/ref/sample.png \
#     --output_path ./assets/results/sample.png \
#     --visualize
#
#   → SR 결과: ./assets/results/sample.png
#   → 히트맵:  ./assets/results/sample_aicg_vis.png  (Trust | Verify | Combined)
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 2] 단일 이미지 SR + 시각화 (사용자 ROI 마스크 지정)
#
#   python demo_tiled.py \
#     --lq_path        ./assets/lq/sample.png \
#     --ref_path       ./assets/ref/sample.png \
#     --output_path    ./assets/results/sample.png \
#     --visualize \
#     --roi_path       ./assets/roi/sample_mask.png \
#     --vis_output_path ./assets/results/sample_vis.png
#
#   → ROI 마스크(grayscale PNG)가 지정된 영역만 Trust/Combined 맵에 반영됨.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 3] 폴더 배치 처리 + 시각화 (ROI도 폴더로 지정)
#
#   python demo_tiled.py \
#     --lq_path     ./assets/lq/ \
#     --ref_path    ./assets/ref/ \
#     --output_path ./assets/results/ \
#     --visualize \
#     --roi_path    ./assets/roi/
#
#   → lq/, ref/, roi/ 안의 동일 파일명 이미지를 자동 매칭하여 전부 처리.
#   → roi/ 에 해당 파일이 없는 이미지는 전체 영역을 ROI로 사용 (경고 출력).
#   → 각 이미지에 대해 results/<파일명>_aicg_vis.png 생성.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 3-b] 폴더 배치 처리 + ROI 단일 파일 공통 적용
#
#   python demo_tiled.py \
#     --lq_path     ./assets/lq/ \
#     --ref_path    ./assets/ref/ \
#     --output_path ./assets/results/ \
#     --visualize \
#     --roi_path    ./assets/roi/common_mask.png
#
#   → ROI 마스크 1장을 모든 이미지에 동일하게 적용.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [예시 4] YAML에서 시각화 기본값 활성화 (이 파일 수정)
#
#   visualize:        true
#   roi_path:         null          # 또는 "./assets/roi/mask.png"
#   vis_output_path:  null          # 자동 경로
#
#   python demo_tiled.py --config ./configs/demo_tiled_config.yaml \
#     --lq_path ./assets/lq/ --ref_path ./assets/ref/ --output_path ./out/
#
# ─────────────────────────────────────────────────────────────────────────────
#
# [히트맵 해석 가이드]
#
#   Map1 Trust    – 밝은 영역: LQ ROI 가 Ref 이미지의 해당 위치를 강하게 참조함.
#                  어두운 영역: 참조가 거의 없어 SR에 Ref 기여 없음.
#
#   Map2 Verify   – 밝은 영역: AICG Gate가 열려 있어 Ref 정보가 신뢰됨.
#                  어두운 영역: Gate가 닫혀 있어 Ref 정보가 억제됨 (불일치 감지).
#
#   Map3 Combined – Map1 × Map2. 실제 복원에 기여한 Ref의 유효 위치.
#                  Trust 하고 Verify 된 교집합 영역.
#
#   세 맵이 모두 어두우면 → SR이 Ref 없이 내재적 prior 만으로 복원됨.
#   Map1은 밝은데 Map2가 어두우면 → LQ가 Ref를 참조했지만 AICG가 억제함
#                                     (Ref 품질 불량 / 의미론적 불일치).
# ─────────────────────────────────────────────────────────────────────────────
